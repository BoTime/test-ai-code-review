name: PR Review (PR-Agent)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PR-Agent (pinned deps)
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade --upgrade-strategy eager "pr-agent" "httpx<0.28"

      - name: Run review
        env:
          OPENAI__KEY: ${{ secrets.OPENAI_API_KEY }}
          CONFIG__GIT_PROVIDER: github
          GITHUB__USER_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          LITELLM_LOG: DEBUG
          PYTHONUNBUFFERED: "1"
        shell: bash
        run: |
          set -Eeuo pipefail
          trap 'echo "::error::PR-Agent step failed at line ${LINENO}"' ERR

          python -u -m pr_agent.cli --pr_url "$PR_URL" review 2>&1 | tee pr-agent.log

          if grep -En "Traceback|ERROR[[:space:]]+\\||Failed to review PR|RetryError|APIConnectionError" pr-agent.log; then
            echo "::error::PR-Agent reported errors in logs"
            exit 1
          fi
